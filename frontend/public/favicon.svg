<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Anime Anilysis graph A logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#03172d"/>
      <stop offset="58%" stop-color="#020d1d"/>
      <stop offset="100%" stop-color="#010713"/>
    </radialGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2da8ff"/>
      <stop offset="55%" stop-color="#0d7dff"/>
      <stop offset="100%" stop-color="#0058d8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb22e"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </linearGradient>
    <filter id="blueGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Main A outline -->
  <g fill="none" stroke="url(#blue)" stroke-linecap="round" stroke-linejoin="round" filter="url(#blueGlow)">
    <path d="M512 214 L255 782" stroke-width="12"/>
    <path d="M512 214 L769 782" stroke-width="12"/>
    <path d="M331 610 L693 610" stroke-width="12"/>
  </g>

  <!-- Internal graph connections -->
  <g fill="none" stroke="url(#blue)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.96">
    <path d="M435 375 L564 332"/>
    <path d="M435 375 L472 454"/>
    <path d="M564 332 L472 454"/>
    <path d="M472 454 L365 529"/>
    <path d="M365 529 L512 610"/>
    <path d="M331 610 L365 529"/>
    <path d="M331 610 L382 704"/>
    <path d="M255 782 L382 704"/>
    <path d="M382 704 L512 610"/>
    <path d="M512 610 L646 694"/>
    <path d="M646 694 L769 782"/>
    <path d="M646 694 L693 610"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#softShadow)">
    <circle cx="512" cy="214" r="36" fill="url(#blue)"/>
    <circle cx="564" cy="332" r="19" fill="url(#blue)"/>
    <circle cx="435" cy="375" r="23" fill="url(#orange)"/>
    <circle cx="472" cy="454" r="19" fill="url(#blue)"/>
    <circle cx="615" cy="452" r="23" fill="url(#orange)"/>
    <circle cx="365" cy="529" r="22" fill="url(#blue)"/>
    <circle cx="331" cy="610" r="20" fill="url(#blue)"/>
    <circle cx="512" cy="610" r="37" fill="url(#blue)"/>
    <circle cx="693" cy="610" r="20" fill="url(#blue)"/>
    <circle cx="382" cy="704" r="22" fill="url(#orange)"/>
    <circle cx="646" cy="694" r="19" fill="url(#blue)"/>
    <circle cx="255" cy="782" r="36" fill="url(#blue)"/>
    <circle cx="769" cy="782" r="36" fill="url(#blue)"/>
  </g>
</svg>
